name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            export PATH=$PATH:/usr/local/bin:/usr/bin

            if [ ! -d "${{ vars.APP_DIR }}/.git" ]; then
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git ${{ vars.APP_DIR }}
            fi

            cd ${{ vars.APP_DIR }}
            git pull origin main
            docker compose up --build -d
            docker compose ps
