name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /home/${{ vars.VM_USER }}/email-track-api

    steps:
      - name: Install Docker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            if ! command -v docker &> /dev/null; then
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker ${{ vars.VM_USER }}
            fi

      - name: Clone or pull repo
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            APP_DIR="${{ env.APP_DIR }}"

            if [ -z "$APP_DIR" ]; then
              echo "ERROR: APP_DIR variable is not set"
              exit 1
            fi

            if [ -d "$APP_DIR/.git" ]; then
              cd "$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf "$APP_DIR"
              git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git "$APP_DIR"
            fi

      - name: Configure Docker DNS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            echo '{"dns": ["8.8.8.8", "8.8.4.4"]}' | sudo tee /etc/docker/daemon.json
            sudo systemctl restart docker

      - name: Setup Nginx
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            if ! command -v nginx &> /dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y nginx
            fi

            sudo tee /etc/nginx/sites-available/email-track-api > /dev/null << 'EOF'
            server {
                listen 80;
                server_name ${{ vars.DOMAIN }};

                location / {
                    proxy_pass http://localhost:8000;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
            }
            EOF

            sudo ln -sf /etc/nginx/sites-available/email-track-api /etc/nginx/sites-enabled/
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

      - name: Setup SSL
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            if ! command -v certbot &> /dev/null; then
              sudo apt-get install -y certbot python3-certbot-nginx
            fi
            sudo certbot --nginx -d ${{ vars.DOMAIN }} \
              --non-interactive --agree-tos \
              -m ${{ vars.CERT_EMAIL }} \
              --keep-until-expiring

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            sudo docker compose up --build -d

      - name: Verify
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.VM_HOST }}
          username: ${{ vars.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ${{ env.APP_DIR }}
            sudo docker compose ps
